<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benimle randuya çıkar mısın?</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffe6e6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            position: relative;
        }
        h1 {
            color: #ff4d6d;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        p {
            color: #4a4a4a;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }
        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            height: 80px;
        }
        button, input[type="submit"] {
            padding: 12px 25px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s ease;
        }
        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 4px 10px rgba(255, 77, 109, 0.3);
        }
        #noBtn {
            background-color: #a0a0a0;
            color: white;
            position: absolute;
            z-index: 10;
        }
        /* Styling voor het formulier */
        .form-section {
            display: none;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
            text-align: left;
        }
        label {
            font-weight: bold;
            color: #4a4a4a;
            font-size: 0.95rem;
            display: block;
            margin-bottom: 8px;
        }
        .custom-question {
            font-size: 1.15rem;
            font-weight: bold;
            color: #ff4d6d;
            text-align: center;
            margin-top: 5px;
            margin-bottom: 8px;
        }
        input[type="date"], textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ffb3c1;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            font-family: inherit;
        }
        textarea {
            height: 80px;
            resize: none;
        }
        input:focus, textarea:focus {
            border-color: #ff4d6d;
        }
        #submitBtn {
            background-color: #ff4d6d;
            color: white;
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <h1 id="question">Benimle randevuya çıkar mısın?</h1>
        <p id="subtext">Zaten eşim olsan da seninle baş başa güzel bir randevuya çıkmayı çok istiyorum aşkım! Ama şşşt, bu randevu tamamen sürpriz og bir sır... 😉</p>

        <!-- Stap 1: De Knoppen (met de wegslaande nee-knop) -->
        <div class="buttons" id="initialButtons">
            <button id="yesBtn" onclick="showForm()">Evet!</button>
            <button id="noBtn" onmouseover="moveNoButton()" onclick="moveNoButton()">Hayır</button>
        </div>

        <!-- Stap 2: Datum + Jouw persoonlijke open vraag -->
        <form action="https://formsubmit.co" method="POST" id="dateAndQuestionForm" class="form-section" onsubmit="sendDetails(event)">
            <input type="hidden" name="_ajax" value="true">
            <input type="hidden" name="_subject" value="Eşinden Gizli Randevu Detayları! 📅❤️">
            <input type="hidden" name="_captcha" value="false">

            <!-- Deel A: Datum kiezen -->
            <div>
                <label for="datePicker">Hangi gün sana uyar? Gizli randevumuz için bir gün seç aşkım: 📅</label>
                <input type="date" id="datePicker" name="Gekozen Datum" required>
            </div>
            
            <!-- Deel B: Jouw open vraag -->
            <div>
                <div class="custom-question">What was your favorite date with me? 🫶</div>
                <textarea id="responseText" name="Favori Randevu Cevabı" placeholder="Buraya yazabilirsin aşkım..." required></textarea>
            </div>
            
            <input type="submit" id="submitBtn" value="Gönder! ❤️">
        </form>
    </div>

    <script>
        let yesScale = 1;
        let noAttempts = 0;

        const customPhrases = [
            "esim que pasa?",
            "no una seguna por favor?",
            "no poffertjes?",
            "no amazing hugs?",
            "no stroopwafels?",
            "no free chocolate?"
        ];

        // Zorg dat ze geen datum in het verleden kan kiezen
        const today = new Date().toISOString().split('T');
        document.getElementById('datePicker').setAttribute('min', today);

        function moveNoButton() {
            const noBtn = document.getElementById('noBtn');
            const yesBtn = document.getElementById('yesBtn');
            
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 40) + 20;
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 40) + 20;
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';

            yesScale += 0.25;
            yesBtn.style.transform = `scale(${yesScale})`;
            
            const currentPhrase = customPhrases[noAttempts % customPhrases.length];
            document.getElementById('subtext').innerText = currentPhrase;
            
            noAttempts++;
        }

        function showForm() {
            document.getElementById('question').innerText = "Hadi planlayalım! 🎉";
            document.getElementById('subtext').innerText = "Bilgileri doldur aşkım, gerisi bende.";
            
            document.getElementById('initialButtons').style.display = 'none';
            document.getElementById('dateAndQuestionForm').style.display = 'flex';
        }

        function sendDetails(event) {
            event.preventDefault();
            
            const form = document.getElementById('dateAndQuestionForm');
            const chosenDate = document.getElementById('datePicker').value;
            const dateObj = new Date(chosenDate);
            const formattedDate = dateObj.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' });

            // Eindscherm tonen
            document.getElementById('question').innerText = "Tamamdır, aldım! 😍";
            document.getElementById('subtext').innerText = `${formattedDate} tarihindeki gizli randevumuz ve cevabın için şimdiden çok heyecanlıyım eşim. Seni çok seviyorum!`;
            document.getElementById('dateAndQuestionForm').style.display = 'none';

            // Verzend alles geruisloos naar je Gmail
            fetch(form.action, {
                method: "POST",
                body: new FormData(form)
            });
        }
    </script>

</body>
</html>
