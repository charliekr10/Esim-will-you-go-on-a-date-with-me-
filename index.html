<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benimle randuya çıkar mısın?</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffe6e6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            position: relative;
        }
        h1 {
            color: #ff4d6d;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        p {
            color: #4a4a4a;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }
        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            height: 80px;
        }
        button, input[type="submit"] {
            padding: 12px 25px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s ease;
        }
        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 4px 10px rgba(255, 77, 109, 0.3);
        }
        #noBtn {
            background-color: #a0a0a0;
            color: white;
            position: absolute;
            z-index: 10;
        }
        /* Styling voor het romantische invulveld */
        .proposal-section {
            display: none;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
            text-align: left;
        }
        .proposal-text {
            font-size: 1.3rem;
            font-weight: bold;
            color: #ff4d6d;
            line-height: 1.5;
            margin-bottom: 10px;
            text-align: center;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 12px;
            border: 2px solid #ffb3c1;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            resize: none;
            font-family: inherit;
        }
        textarea:focus {
            border-color: #ff4d6d;
        }
        #submitBtn {
            background-color: #ff4d6d;
            color: white;
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <h1 id="question">Benimle randevuya çıkar mısın?</h1>
        <p id="subtext">Zaten eşim olsan da seninle baş başa güzel bir randevuya çıkmayı çok istiyorum aşkım! Ama şşşt, bu randevu tamamen sürpriz og bir sır... 😉</p>

        <!-- Stap 1: De Date Knoppen -->
        <div class="buttons" id="initialButtons">
            <button id="yesBtn" onclick="showCalendar()">Evet!</button>
            <button id="noBtn" onmouseover="moveNoButton()" onclick="moveNoButton()">Hayır</button>
        </div>

        <!-- Stap 2: Het open invulveld voor haar antwoord -->
        <form action="https://formsubmit.co" method="POST" id="proposalForm" class="proposal-section" onsubmit="sendDetails(event)">
            <input type="hidden" name="_ajax" value="true">
            <input type="hidden" name="_subject" value="Eşinden Mesajın Var! 💍❤️">
            <input type="hidden" name="_captcha" value="false">

            <div class="proposal-text">
                To the most beautiful girl in the world, can i give you my last name? 💍
            </div>
            
            <div>
                <textarea id="responseText" name="Cevabı" placeholder="Buraya yazabilirsin aşkım..." required></textarea>
            </div>
            
            <input type="submit" id="submitBtn" value="Gönder! ❤️">
        </form>
    </div>

    <script>
        let yesScale = 1;
        let noAttempts = 0;

        const customPhrases = [
            "esim que pasa?",
            "no una seguna por favor?",
            "no poffertjes?",
            "no amazing hugs?",
            "no stroopwafels?",
            "no free chocolate?"
        ];

        function moveNoButton() {
            const noBtn = document.getElementById('noBtn');
            const yesBtn = document.getElementById('yesBtn');
            
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 40) + 20;
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 40) + 20;
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';

            yesScale += 0.25;
            yesBtn.style.transform = `scale(${yesScale})`;
            
            const currentPhrase = customPhrases[noAttempts % customPhrases.length];
            document.getElementById('subtext').innerText = currentPhrase;
            
            noAttempts++;
        }

        function showCalendar() {
            document.getElementById('question').innerText = "Hadi planlayalım! 🎉";
            document.getElementById('subtext').innerText = "Sana küçük bir sorum daha var aşkım...";
            
            document.getElementById('initialButtons').style.display = 'none';
            document.getElementById('proposalForm').style.display = 'flex';
        }

        function sendDetails(event) {
            event.preventDefault();
            
            const form = document.getElementById('proposalForm');

            // Direct het lieve eindscherm tonen
            document.getElementById('question').innerText = "Tamamdır, aldım! 😍";
            document.getElementById('subtext').innerText = "Gizli randevumuz ve cevabın için şimdiden çok heyecanlıyım eşim. Seni çok seviyorum!";
            document.getElementById('proposalForm').style.display = 'none';

            // Verzend haar getypte antwoord geruisloos naar jouw Gmail
            fetch(form.action, {
                method: "POST",
                body: new FormData(form)
            });
        }
    </script>

</body>
</html>
