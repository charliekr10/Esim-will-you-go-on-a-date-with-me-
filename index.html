<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benimle randuya çıkar mısın?</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffe6e6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            position: relative;
        }
        h1 {
            color: #ff4d6d;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        p {
            color: #4a4a4a;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }
        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            height: 80px;
        }
        button {
            padding: 12px 25px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s ease;
        }
        #yesBtn, #proposalYesBtn {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 4px 10px rgba(255, 77, 109, 0.3);
        }
        #noBtn, #proposalNoBtn {
            background-color: #a0a0a0;
            color: white;
            position: absolute;
            z-index: 10;
        }
        /* Styling voor het romantische aanzoek */
        .proposal-section {
            display: none;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }
        .proposal-text {
            font-size: 1.3rem;
            font-weight: bold;
            color: #ff4d6d;
            line-height: 1.5;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <h1 id="question">Benimle randevuya çıkar mısın?</h1>
        <p id="subtext">Zaten eşim olsan da seninle baş başa güzel bir randevuya çıkmayı çok istiyorum aşkım! Ama şşşt, bu randevu tamamen sürpriz ve bir sır... 😉</p>

        <!-- Stap 1: De Date Knoppen -->
        <div class="buttons" id="initialButtons">
            <button id="yesBtn" onclick="showCalendar()">Evet!</button>
            <button id="noBtn" onmouseover="moveNoButton()" onclick="moveNoButton()">Hayır</button>
        </div>

        <!-- Stap 2: Het Aanzoek (Formulier en invoervelden zijn nu weg) -->
        <div class="proposal-section" id="proposalForm">
            <div class="proposal-text">
                To the most beautiful girl in the world, can i give you my last name? 💍
            </div>
            
            <div class="buttons" style="position: relative; width: 100%;">
                <button id="proposalYesBtn" onclick="sendDetails()">Evet!</button>
                <button id="proposalNoBtn" onmouseover="moveProposalNoButton()" onclick="moveProposalNoButton()">Hayır</button>
            </div>
        </div>
    </div>

    <script>
        let yesScale = 1;
        let proposalYesScale = 1;
        let noAttempts = 0;
        let proposalNoAttempts = 0;

        // Jouw eigen grappige zinnen voor de eerste Nee-knop
        const customPhrases = [
            "esim que pasa?",
            "no una seguna por favor?",
            "no poffertjes?",
            "no amazing hugs?",
            "no stroopwafels?",
            "no free chocolate?"
        ];

        // 1. Beweging voor de EERSTE Nee-knop (Date-vraag)
        function moveNoButton() {
            const noBtn = document.getElementById('noBtn');
            const yesBtn = document.getElementById('yesBtn');
            
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 40) + 20;
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 40) + 20;
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';

            yesScale += 0.25;
            yesBtn.style.transform = `scale(${yesScale})`;
            
            const currentPhrase = customPhrases[noAttempts % customPhrases.length];
            document.getElementById('subtext').innerText = currentPhrase;
            
            noAttempts++;
        }

        // Als ze op de eerste "Evet!" klikt, gaat ze naar het aanzoek
        function showCalendar() {
            document.getElementById('question').innerText = "Hadi planlayalım! 🎉";
            document.getElementById('subtext').innerText = "Sana küçük bir sorum daha var aşkım...";
            
            document.getElementById('initialButtons').style.display = 'none';
            document.getElementById('proposalForm').style.display = 'flex';
            
            // Zorg dat de tweede nee-knop goed gepositioneerd start binnen de container
            resetProposalNoButton();
        }

        // 2. Beweging voor de TWEEDE Nee-knop (Aanzoek-vraag)
        function moveProposalNoButton() {
            const noBtn = document.getElementById('proposalNoBtn');
            const yesBtn = document.getElementById('proposalYesBtn');
            
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 40) + 20;
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 40) + 20;
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';

            proposalYesScale += 0.25;
            yesBtn.style.transform = `scale(${proposalYesScale})`;
            
            // Grappige Turkse reacties specifiek voor het aanzoek als ze op nee probeert te klikken
            proposalNoAttempts++;
            if (proposalNoAttempts === 2) {
                document.getElementById('subtext').innerText = "Eşim, ciddi misin? Kırmızı butona bas! 👀";
            } else if (proposalNoAttempts === 4) {
                document.getElementById('subtext').innerText = "Bu sorudan kaçamazsın aşkım, 'Evet' demek zorundasın! 💍";
            }
        }

        function resetProposalNoButton() {
            const noBtn = document.getElementById('proposalNoBtn');
            noBtn.style.position = 'relative';
            noBtn.style.left = '0px';
            noBtn.style.top = '0px';
        }

        // Als ze op de tweede "Evet!" klikt, wordt de e-mail verstuurd
        function sendDetails() {
            document.getElementById('question').innerText = "Seni çok seviyorum! 😍";
            document.getElementById('subtext').innerText = "Gizli randevumuz ve her şey için şimdiden çok heyecanlıyım eşim. Sonsuza dek!";
            document.getElementById('proposalForm').style.display = 'none';

            // Stuurt de definitieve 'JA' geruisloos naar jouw Gmail
            fetch("https://formsubmit.co", {
                method: "POST",
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({
                    "_subject": "Eşinden Harika Bir Haber! 💍❤️",
                    "Aanzoek Beantwoord": "JA! Ze wil jouw achternaam! 😍",
                    "_captcha": "false"
                })
            });
        }
    </script>

</body>
</html>
